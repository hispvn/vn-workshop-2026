[project]
name = "prefect-dhis2"
version = "0.1.0"
description = "Prefect integration for DHIS2 -- credentials block and API client."
requires-python = ">=3.13"
dependencies = [
    "prefect>=3.0",
    "dhis2-client @ git+https://github.com/dhis2/dhis2-python-client",
]

[tool.hatch.metadata]
allow-direct-references = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
