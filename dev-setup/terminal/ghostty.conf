# ============================================================================
# Ghostty Terminal Configuration
# ============================================================================
# Install: cp ghostty.conf ~/.config/ghostty/config
# Purpose: GPU-accelerated terminal emulator settings.
# Prerequisites: Install Ghostty from https://ghostty.org
#                Install a Nerd Font (see terminal/README.md)
# ============================================================================

font-family = "JetBrainsMonoNL Nerd Font Mono"
font-size = 14
cursor-style = block
cursor-style-blink = false
shell-integration-features = no-cursor

window-width = 155
window-height = 45
theme = GitHub Dark Default
background-opacity = 0.9
background-blur
window-padding-x = 8
window-padding-y = 6

keybind = shift+cmd+left=move_tab:-1
keybind = shift+cmd+right=move_tab:1
keybind = cmd+left=previous_tab
keybind = cmd+right=next_tab
