# ============================================================================
# tmux Configuration
# ============================================================================
# Install: cp tmux.conf ~/.tmux.conf
# Purpose: Terminal multiplexer — split panes, persistent sessions.
# Prerequisites: brew install tmux
# ============================================================================

set -g mouse on
set -g default-terminal "screen-256color"

# Status bar
set -g status-bg black
set -g status-fg white
set -g status-left "#[fg=green](#S) #[fg=blue]%H:%M %d-%b-%y"
set -g status-right "#[fg=yellow]#(whoami) | #[fg=cyan]#(hostname)"

# Split panes with h/v in current path
bind-key h split-window -h -c "#{pane_current_path}"
bind-key v split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind-key x kill-pane

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Don't rename windows automatically
set-option -g allow-rename off

# Silence bells
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none
